name: proveo-ci

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ci_root_only
      MYSQL_DATABASE: proveocomercio
      MYSQL_USER: proveo_ci
      MYSQL_PASSWORD: ci_test_only_pw
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  backend:
    build: ./backend
    environment:
      NODE_ENV: test
      PORT: "3000"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ALLOW_SIMULATED_MAIL: "true"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: proveocomercio
      DB_USER: proveo_ci
      DB_PASSWORD: ci_test_only_pw
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 15s

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

networks:
  default:
    name: proveo-ci
