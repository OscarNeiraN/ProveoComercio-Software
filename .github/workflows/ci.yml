name: CI

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "migration/**"
      - "docker-compose*.yml"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "migration/**"
      - "docker-compose*.yml"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    name: 1. Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run unit tests
        working-directory: backend
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results
          npm test -- --test-reporter=tap > test-results/unit.tap

      - name: Upload unit test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: backend/test-results/
          if-no-files-found: warn

  sast:
    name: 2. SAST And Dependency Scan
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install Semgrep
        run: python -m pip install --upgrade semgrep

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Prepare SAST reports
        run: mkdir -p security-reports/sast

      - name: Validate Snyk configuration
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_ORG: ${{ secrets.SNYK_ORG }}
        shell: bash
        run: |
          set -euo pipefail
          failed=0
          if [ -z "${SNYK_TOKEN:-}" ]; then
            echo "Missing GitHub secret: SNYK_TOKEN" > security-reports/sast/snyk-token.txt
            failed=1
          fi
          if [ -z "${SNYK_ORG:-}" ]; then
            echo "Missing GitHub secret: SNYK_ORG" > security-reports/sast/snyk-org.txt
            failed=1
          fi
          echo "$failed" > security-reports/sast/snyk-config.exitcode

      - name: npm audit gate
        shell: bash
        run: |
          set +e
          cd backend
          npm audit --omit=dev --audit-level=high --json > ../security-reports/sast/npm-audit.json
          echo "$?" > ../security-reports/sast/npm-audit.exitcode
          set -e

      - name: Snyk Open Source dependency gate
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_ORG: ${{ secrets.SNYK_ORG }}
        shell: bash
        run: |
          set +e
          if [ -z "${SNYK_TOKEN:-}" ] || [ -z "${SNYK_ORG:-}" ]; then
            echo "SNYK_TOKEN or SNYK_ORG is missing; Snyk Open Source scan was not executed." > security-reports/sast/snyk-open-source.txt
            echo "1" > security-reports/sast/snyk-open-source.exitcode
          else
            cd backend
            snyk test \
              --org="${SNYK_ORG}" \
              --severity-threshold=high \
              --json-file-output=../security-reports/sast/snyk-open-source.json \
              --sarif-file-output=../security-reports/sast/snyk-open-source.sarif
            echo "$?" > ../security-reports/sast/snyk-open-source.exitcode
          fi
          set -e

      - name: Snyk Code gate
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_ORG: ${{ secrets.SNYK_ORG }}
        shell: bash
        run: |
          set +e
          if [ -z "${SNYK_TOKEN:-}" ] || [ -z "${SNYK_ORG:-}" ]; then
            echo "SNYK_TOKEN or SNYK_ORG is missing; Snyk Code scan was not executed." > security-reports/sast/snyk-code.txt
            echo "1" > security-reports/sast/snyk-code.exitcode
          else
            snyk code test \
              --org="${SNYK_ORG}" \
              --severity-threshold=high \
              --json-file-output=security-reports/sast/snyk-code.json \
              --sarif-file-output=security-reports/sast/snyk-code.sarif \
              .
            echo "$?" > security-reports/sast/snyk-code.exitcode
          fi
          set -e

      - name: Semgrep SAST gate
        shell: bash
        run: |
          set +e
          semgrep scan \
            --config p/javascript \
            --config p/nodejs \
            --config p/secrets \
            --sarif \
            --output security-reports/sast/semgrep.sarif \
            --error \
            .
          echo "$?" > security-reports/sast/semgrep.exitcode
          set -e

      - name: Trivy filesystem gate
        shell: bash
        run: |
          set +e
          docker run --rm \
            -v "$PWD:/workspace" \
            aquasec/trivy:latest fs \
            --format sarif \
            --output /workspace/security-reports/sast/trivy-fs.sarif \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            /workspace
          echo "$?" > security-reports/sast/trivy-fs.exitcode
          set -e

      - name: Upload SAST artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-security-reports
          path: security-reports/sast/
          if-no-files-found: warn

      - name: SAST quality gate
        shell: bash
        run: |
          set -euo pipefail
          failed=0
          for file in security-reports/sast/*.exitcode; do
            code="$(cat "$file")"
            echo "$(basename "$file") => $code"
            if [ "$code" != "0" ]; then
              failed=1
            fi
          done
          if [ "$failed" = "1" ]; then
            echo "SAST/dependency scan found vulnerabilities or scanner errors." >&2
            exit 1
          fi

  dast:
    name: 3. DAST OWASP ZAP
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare DAST reports
        run: mkdir -p security-reports/dast

      - name: Start CI application
        shell: bash
        run: |
          set -euo pipefail
          export JWT_SECRET="$(openssl rand -hex 32)"
          docker compose -f docker-compose.ci.yml up -d --build
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.ci.yml ps
          exit 1

      - name: OWASP ZAP baseline scan
        shell: bash
        run: |
          set +e
          docker run --rm \
            --network proveo-ci \
            -v "$PWD/security-reports/dast:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://frontend \
            -r zap-report.html \
            -J zap-report.json \
            -x zap-report.xml \
            -a
          echo "$?" > security-reports/dast/zap.exitcode
          set -e

      - name: Collect DAST logs
        if: always()
        shell: bash
        run: |
          docker compose -f docker-compose.ci.yml logs --no-color > security-reports/dast/docker-compose.log 2>&1 || true
          docker compose -f docker-compose.ci.yml ps > security-reports/dast/docker-compose-ps.txt 2>&1 || true

      - name: Stop CI application
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v || true

      - name: Upload DAST artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-zap-reports
          path: security-reports/dast/
          if-no-files-found: warn

      - name: DAST quality gate
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f security-reports/dast/zap.exitcode ]; then
            echo "ZAP did not produce an exit code." >&2
            exit 1
          fi
          code="$(cat security-reports/dast/zap.exitcode)"
          echo "zap.exitcode => $code"
          if [ "$code" != "0" ]; then
            echo "DAST found alerts or scanner errors." >&2
            exit 1
          fi
