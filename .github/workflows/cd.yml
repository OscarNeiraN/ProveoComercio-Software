name: CD

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ecs-cd-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: false

jobs:
  continuous-delivery:
    name: 1. Continuous Delivery To ECR
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
      }}
    outputs:
      backend_image: ${{ steps.resolve.outputs.backend_image }}
      frontend_image: ${{ steps.resolve.outputs.frontend_image }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      PROJECT_NAME: proveocomercio
      BACKEND_ECR_REPOSITORY: proveocomercio-backend
      FRONTEND_ECR_REPOSITORY: proveocomercio-frontend
      COMMIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Validate delivery secrets
        shell: bash
        run: |
          set -euo pipefail
          required=(
            AWS_ACCESS_KEY_ID
            AWS_SECRET_ACCESS_KEY
            AWS_SESSION_TOKEN
            AWS_REGION
          )
          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Missing GitHub secret: $key" >&2
              exit 1
            fi
          done

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image names
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          registry="${{ steps.login-ecr.outputs.registry }}"
          tag="${COMMIT_SHA::12}"
          backend_image="${registry}/${BACKEND_ECR_REPOSITORY}:${tag}"
          frontend_image="${registry}/${FRONTEND_ECR_REPOSITORY}:${tag}"

          echo "ECR_REGISTRY=${registry}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${tag}" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE=${backend_image}" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=${frontend_image}" >> "$GITHUB_ENV"

          echo "image_tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${backend_image}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${frontend_image}" >> "$GITHUB_OUTPUT"

      - name: Build backend image
        run: |
          docker build \
            -t "$BACKEND_IMAGE" \
            -t "$ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:latest" \
            backend

      - name: Build frontend image
        run: |
          docker build \
            -t "$FRONTEND_IMAGE" \
            -t "$ECR_REGISTRY/$FRONTEND_ECR_REPOSITORY:latest" \
            frontend

      - name: Scan backend image
        shell: bash
        run: |
          mkdir -p security-reports/images
          set +e
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/security-reports/images:/reports" \
            aquasec/trivy:latest image \
            --format sarif \
            --output /reports/backend-image.sarif \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            "$BACKEND_IMAGE"
          echo "$?" > security-reports/images/backend-image.exitcode
          set -e

      - name: Scan frontend image
        shell: bash
        run: |
          set +e
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/security-reports/images:/reports" \
            aquasec/trivy:latest image \
            --format sarif \
            --output /reports/frontend-image.sarif \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            "$FRONTEND_IMAGE"
          echo "$?" > security-reports/images/frontend-image.exitcode
          set -e

      - name: Upload image scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-image-security-reports
          path: security-reports/images/
          if-no-files-found: warn

      - name: Container image report policy
        shell: bash
        run: |
          set -euo pipefail
          found=0
          for file in security-reports/images/*.exitcode; do
            code="$(cat "$file")"
            echo "$(basename "$file") => $code"
            if [ "$code" != "0" ]; then
              found=1
            fi
          done
          if [ "$found" = "1" ]; then
            echo "::warning::Container image scan found vulnerabilities or scanner warnings. Deployment is not blocked; review the container-image-security-reports artifact."
          else
            echo "Container image scan completed without blocking findings."
          fi

      - name: Push backend image
        run: |
          docker push "$BACKEND_IMAGE"
          docker push "$ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:latest"

      - name: Push frontend image
        run: |
          docker push "$FRONTEND_IMAGE"
          docker push "$ECR_REGISTRY/$FRONTEND_ECR_REPOSITORY:latest"

      - name: Create delivery metadata
        shell: bash
        run: |
          mkdir -p delivery
          cat > delivery/ecr-images.json <<EOF
          {
            "backend_image": "${BACKEND_IMAGE}",
            "frontend_image": "${FRONTEND_IMAGE}",
            "image_tag": "${IMAGE_TAG}",
            "commit_sha": "${COMMIT_SHA}",
            "ecr_registry": "${ECR_REGISTRY}"
          }
          EOF

      - name: Upload delivery artifact
        uses: actions/upload-artifact@v4
        with:
          name: ecr-delivery-metadata
          path: delivery/ecr-images.json

  continuous-deployment:
    name: 2. Continuous Deployment To ECS
    runs-on: ubuntu-latest
    needs: continuous-delivery
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      PROJECT_NAME: proveocomercio
      ECS_CLUSTER: proveocomercio-cluster
      ECS_FRONTEND_SERVICE: proveocomercio-frontend-service
      ECS_BACKEND_SERVICE: proveocomercio-backend-service
      ECS_WORKER_SERVICE: proveocomercio-worker-service
      BACKEND_ECR_REPOSITORY: proveocomercio-backend
      FRONTEND_ECR_REPOSITORY: proveocomercio-frontend
      FRONTEND_TASK_DEFINITION_FAMILY: proveocomercio-frontend
      BACKEND_TASK_DEFINITION_FAMILY: proveocomercio-backend
      WORKER_TASK_DEFINITION_FAMILY: proveocomercio-worker
      COMMIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Validate deployment secrets
        shell: bash
        run: |
          set -euo pipefail
          required=(
            AWS_ACCESS_KEY_ID
            AWS_SECRET_ACCESS_KEY
            AWS_SESSION_TOKEN
            AWS_REGION
          )
          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Missing value for deployment: $key" >&2
              exit 1
            fi
          done

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR for deployment
        id: login-ecr-deploy
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve deployment image names
        id: resolve-deployment-images
        shell: bash
        env:
          DELIVERY_BACKEND_IMAGE: ${{ needs['continuous-delivery'].outputs.backend_image }}
          DELIVERY_FRONTEND_IMAGE: ${{ needs['continuous-delivery'].outputs.frontend_image }}
          DELIVERY_IMAGE_TAG: ${{ needs['continuous-delivery'].outputs.image_tag }}
          ECR_REGISTRY: ${{ steps.login-ecr-deploy.outputs.registry }}
        run: |
          set -euo pipefail

          tag="${DELIVERY_IMAGE_TAG:-${COMMIT_SHA::12}}"

          if [ -n "${DELIVERY_BACKEND_IMAGE:-}" ] && [ -n "${DELIVERY_FRONTEND_IMAGE:-}" ]; then
            backend_image="$DELIVERY_BACKEND_IMAGE"
            frontend_image="$DELIVERY_FRONTEND_IMAGE"
          else
            if [ -z "${ECR_REGISTRY:-}" ]; then
              echo "Could not resolve ECR registry for deployment fallback." >&2
              exit 1
            fi
            backend_image="${ECR_REGISTRY}/${BACKEND_ECR_REPOSITORY}:${tag}"
            frontend_image="${ECR_REGISTRY}/${FRONTEND_ECR_REPOSITORY}:${tag}"
          fi

          if [ -z "$backend_image" ] || [ -z "$frontend_image" ]; then
            echo "Could not resolve deployment image names." >&2
            exit 1
          fi

          case "$backend_image" in
            */*:*) ;;
            *)
              echo "Invalid backend image URI: $backend_image" >&2
              exit 1
              ;;
          esac

          case "$frontend_image" in
            */*:*) ;;
            *)
              echo "Invalid frontend image URI: $frontend_image" >&2
              exit 1
              ;;
          esac

          echo "BACKEND_IMAGE=${backend_image}" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=${frontend_image}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${tag}" >> "$GITHUB_ENV"

          echo "backend_image=${backend_image}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${frontend_image}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${tag}" >> "$GITHUB_OUTPUT"

          echo "Deploy backend image: ${backend_image}"
          echo "Deploy frontend image: ${frontend_image}"

      - name: Validate deployment image names
        shell: bash
        run: |
          set -euo pipefail
          required=(
            BACKEND_IMAGE
            FRONTEND_IMAGE
          )
          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Missing value for deployment: $key" >&2
              exit 1
            fi
          done

      - name: Download current task definitions
        shell: bash
        run: |
          set -euo pipefail

          aws ecs describe-task-definition \
            --task-definition "$BACKEND_TASK_DEFINITION_FAMILY" \
            --query taskDefinition \
            > backend-task-definition.json

          aws ecs describe-task-definition \
            --task-definition "$WORKER_TASK_DEFINITION_FAMILY" \
            --query taskDefinition \
            > worker-task-definition.json

          aws ecs describe-task-definition \
            --task-definition "$FRONTEND_TASK_DEFINITION_FAMILY" \
            --query taskDefinition \
            > frontend-task-definition.json

      - name: Render backend task definition
        id: render-backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: backend-task-definition.json
          container-name: backend
          image: ${{ steps.resolve-deployment-images.outputs.backend_image }}

      - name: Deploy backend service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-backend.outputs.task-definition }}
          service: ${{ env.ECS_BACKEND_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Render worker task definition
        id: render-worker
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: worker-task-definition.json
          container-name: worker
          image: ${{ steps.resolve-deployment-images.outputs.backend_image }}

      - name: Deploy worker service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-worker.outputs.task-definition }}
          service: ${{ env.ECS_WORKER_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Render frontend task definition
        id: render-frontend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: frontend-task-definition.json
          container-name: frontend
          image: ${{ steps.resolve-deployment-images.outputs.frontend_image }}

      - name: Deploy frontend service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-frontend.outputs.task-definition }}
          service: ${{ env.ECS_FRONTEND_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
