<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ProveoComercio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="logo-mark">P</div>
        <span>ProveoComercio</span>
      </div>
      <div class="header-right">
        <div class="api-status">
          <span class="dot" id="dot"></span>
          <span id="statusText">Conectando...</span>
        </div>
        <div class="user-box">
          <button class="btn-secondary" id="authBtn">Ingresar</button>
          <button class="btn-secondary" id="logoutBtn" hidden>Cerrar sesión</button>
        </div>
        <button class="cart-btn" id="cartBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 01-8 0"/>
          </svg>
          <span id="cartCount">0</span>
        </button>
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="hero-inner">
      <div class="hero-tag">Catálogo oficial</div>
      <h1>Tecnología y<br/><em>equipamiento</em></h1>
      <p>Stock actualizado desde AWS RDS en tiempo real</p>
    </div>
    <div class="hero-deco" aria-hidden="true"></div>
  </section>

  <div class="controls-bar">
    <div class="controls-inner">
      <div class="search-wrap">
        <svg class="si" viewBox="0 0 20 20" fill="none">
          <circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M15 15l-3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input id="searchInput" type="text" placeholder="Buscar por nombre o SKU…" autocomplete="off"/>
        <button class="clear-btn" id="clearBtn">✕</button>
      </div>
      <div class="filters" id="filters">
        <button class="pill active" data-cat="">Todos</button>
      </div>
    </div>
  </div>

  <main>
    <div class="meta-row">
      <span id="resultCount">—</span>
      <span id="syncTime" class="muted">—</span>
    </div>
    <div id="errorBanner" class="error-banner" hidden>
      <span id="errorMsg"></span>
    </div>
    <div class="grid" id="grid">
      <div class="sk"></div><div class="sk"></div><div class="sk"></div>
      <div class="sk"></div><div class="sk"></div><div class="sk"></div>
    </div>
  </main>

  <!-- Panel carrito -->
  <aside class="cart-panel" id="cartPanel">
    <div class="cart-header">
      <h2>Carrito</h2>
      <button class="icon-btn" id="cartClose">✕</button>
    </div>
    <div class="cart-items" id="cartItems">
      <div class="cart-empty">Tu carrito está vacío</div>
    </div>
    <div class="cart-footer" id="cartFooter" hidden>
      <div class="cart-total-row">
        <span>Total</span>
        <strong id="cartTotal">$0</strong>
      </div>
      <button class="btn-checkout" id="btnCheckout">Confirmar pedido</button>
    </div>
  </aside>
  <div class="overlay" id="overlay"></div>

  <!-- Modal datos cliente -->
  <div class="modal-wrap" id="modalWrap" hidden>
    <div class="modal">
      <h3>Datos del pedido</h3>
      <div class="form-group">
        <label>Nombre completo</label>
        <input id="fName" type="text" placeholder="Juan Pérez"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input id="fEmail" type="email" placeholder="juan@email.com"/>
      </div>

      <h4 style="font-family:var(--fd);font-size:1rem;font-weight:400;margin:1rem 0 .65rem">Dirección de envío</h4>
      <div class="form-row">
        <div class="form-group">
          <label>Calle</label>
          <input id="fStreet" type="text" placeholder="Av. Providencia"/>
        </div>
        <div class="form-group">
          <label>Número</label>
          <input id="fNumber" type="text" placeholder="1234"/>
        </div>
      </div>
      <div class="form-group">
        <label>Depto / Casa (opcional)</label>
        <input id="fApt" type="text" placeholder="Depto 502"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Comuna</label>
          <input id="fCommune" type="text" placeholder="Providencia"/>
        </div>
        <div class="form-group">
          <label>Región</label>
          <input id="fRegion" type="text" placeholder="Metropolitana"/>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn-secondary" id="btnModalClose">Cancelar</button>
        <button class="btn-primary" id="btnConfirm">Confirmar pedido</button>
      </div>
      <div id="orderResult" class="order-result" hidden></div>
    </div>
  </div>

  <!-- Modal auth -->
  <div class="modal-wrap" id="authWrap" hidden>
    <div class="modal auth-modal">
      <h3 id="authTitle">Iniciar sesión</h3>
      <div class="tab-row">
        <button class="tab active" id="tabLogin">Ingresar</button>
        <button class="tab" id="tabRegister">Registrarse</button>
      </div>
      <div id="loginPanel">
        <div class="form-group">
          <label>Email</label>
          <input id="loginEmail" type="email" placeholder="juan@email.com"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input id="loginPassword" type="password" placeholder="••••••••"/>
        </div>
      </div>
      <div id="registerPanel" hidden>
        <div class="form-group">
          <label>Nombre</label>
          <input id="regFirstName" type="text" placeholder="Juan"/>
        </div>
        <div class="form-group">
          <label>Apellido</label>
          <input id="regLastName" type="text" placeholder="Pérez"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input id="regEmail" type="email" placeholder="juan@email.com"/>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input id="regPassword" type="password" placeholder="••••••••"/>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" id="btnAuthClose">Cerrar</button>
        <button class="btn-primary" id="btnAuthSubmit">Continuar</button>
      </div>
      <div id="authResult" class="order-result" hidden></div>
    </div>
  </div>

  <footer>
    <div class="footer-inner">
      <span>ProveoComercio &copy; 2025</span>
      <span class="muted">Node.js · Express · RDS · Docker</span>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
